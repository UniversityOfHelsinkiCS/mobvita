name: 'Run tests'
description: 'Runs Cypress tests for individual spec'

inputs:
  spec:
    required: true
    description: 'Path to Cypress file'
  context:
    required: true
    description: 'Artifact identifier'

runs:
  using: composite
  steps:
    - name: Set up Node 22
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm

    - name: npm ci
      shell: bash
      run: npm ci --legacy-peer-deps

    - name: Start app for CI
      shell: bash
      env:
        ENVIRONMENT: staging
        REVITA_URL: https://revita-test.cs.helsinki.fi/api
      run: |
        nohup npm run start:ci > /tmp/mobvita-app.log 2>&1 &
        echo $! > /tmp/mobvita-app.pid

    - name: Wait for app to be ready
      shell: bash
      run: npx wait-on --timeout 180000 http-get://localhost:8000

    - name: Run cypress tests
      shell: bash
      run: npm run cypress:run -- --spec ${{ inputs.spec }}

    - name: 'Upload screenshots if tests fail'
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: cypress-screenshots-${{inputs.context}}
        path: /home/runner/work/mobvita/mobvita/cypress/screenshots/

    # Test run video was always captured, so this action uses "always()" condition
    - name: 'Upload Cypress videos'
      uses: actions/upload-artifact@v4 
      if: always()
      with:
        name: cypress-videos-${{inputs.context}}
        path: /home/runner/work/mobvita/mobvita/cypress/videos/

    - name: App diagnostics on failure
      if: failure()
      shell: bash
      run: |
        if [ -s /tmp/mobvita-app.pid ]; then
          APP_PID="$(cat /tmp/mobvita-app.pid)"
          ps -p "$APP_PID" -o pid,ppid,stat,etime,command || true
          pgrep -P "$APP_PID" -a || true
        fi
        tail -n 300 /tmp/mobvita-app.log || true

    - name: Stop app
      if: always()
      shell: bash
      run: |
        if [ -s /tmp/mobvita-app.pid ]; then
          APP_PID="$(cat /tmp/mobvita-app.pid)"
          pkill -TERM -P "$APP_PID" || true
          kill -TERM "$APP_PID" || true
          sleep 1
          pkill -KILL -P "$APP_PID" || true
          kill -KILL "$APP_PID" || true
        fi